services:
  neon-db:
    image: neondatabase/neon_local:latest
    container_name: acquisitions-neon-db
    ports:
      - '5432:5432'
    env_file:
      - .env.development
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U neon -d neondb -h localhost -p 5432']
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acquisitions-app
    ports:
      - '${PORT:-3000}:3000'
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
    command: ['node', '--watch', 'src/index.js']
    volumes:
      - ./src:/app/src
    depends_on:
      neon-db:
        condition: service_healthy
    restart: unless-stopped
