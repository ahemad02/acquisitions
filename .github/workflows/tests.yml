name: Tests

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      NODE_OPTIONS: '--experimental-vm-modules'
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: tests
        run: npm test -- --ci --json --outputFile=test-results.json 2>&1 | tee test-output.txt
        continue-on-error: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Generate test summary
        if: always()
        run: |
          echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f test-results.json ]; then
            TOTAL=$(jq '.numTotalTests // 0' test-results.json)
            PASSED=$(jq '.numPassedTests // 0' test-results.json)
            FAILED=$(jq '.numFailedTests // 0' test-results.json)
            PENDING=$(jq '.numPendingTests // 0' test-results.json)
            SUITES=$(jq '.numTotalTestSuites // 0' test-results.json)
            SUCCESS=$(jq '.success' test-results.json)

            if [ "$SUCCESS" == "true" ]; then
              echo "✅ **All tests passed!**" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **Some tests failed.**" >> $GITHUB_STEP_SUMMARY
            fi

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Test Suites:** $SUITES" >> $GITHUB_STEP_SUMMARY
            echo "- **Total Tests:** $TOTAL" >> $GITHUB_STEP_SUMMARY
            echo "- **Passed:** $PASSED ✅" >> $GITHUB_STEP_SUMMARY
            echo "- **Failed:** $FAILED ❌" >> $GITHUB_STEP_SUMMARY
            echo "- **Pending:** $PENDING ⏸️" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ No structured test results found." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            if [ "${{ steps.tests.outcome }}" == "success" ]; then
              echo "✅ **Tests passed.**" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ **Tests failed.** Check the logs for details." >> $GITHUB_STEP_SUMMARY
            fi
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Coverage" >> $GITHUB_STEP_SUMMARY
          if [ -f coverage/coverage-summary.json ]; then
            LINES=$(jq '.total.lines.pct' coverage/coverage-summary.json)
            BRANCHES=$(jq '.total.branches.pct' coverage/coverage-summary.json)
            FUNCTIONS=$(jq '.total.functions.pct' coverage/coverage-summary.json)
            STMTS=$(jq '.total.statements.pct' coverage/coverage-summary.json)
            echo "- **Statements:** ${STMTS}%" >> $GITHUB_STEP_SUMMARY
            echo "- **Branches:** ${BRANCHES}%" >> $GITHUB_STEP_SUMMARY
            echo "- **Functions:** ${FUNCTIONS}%" >> $GITHUB_STEP_SUMMARY
            echo "- **Lines:** ${LINES}%" >> $GITHUB_STEP_SUMMARY
          else
            echo "Coverage summary not available. See uploaded artifact for details." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Annotate test failures
        if: steps.tests.outcome == 'failure'
        run: |
          echo "::error::Tests failed. Review the test output and coverage report for details."
          if [ -f test-results.json ]; then
            jq -r '.testResults[]? | select(.status == "failed") | .name' test-results.json | while read -r suite; do
              echo "::error file=${suite}::Test suite failed: ${suite}"
            done
          fi
          exit 1

      - name: Confirm success
        if: steps.tests.outcome == 'success'
        run: echo "All tests passed successfully."
